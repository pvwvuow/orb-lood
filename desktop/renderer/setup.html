<!doctype html>
<html lang="en" data-theme="orblood-dark">
<head>
  <meta charset="utf-8" />
  <title>Orblood — Connect</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' http: https:;" />
  <style>
    :root {
      --bg: #020103;
      --panel: rgba(8,5,7,0.95);
      --t1: rgba(248,240,240,0.95);
      --t2: rgba(220,210,210,0.55);
      --t3: rgba(195,185,185,0.32);
      --accent: #b91c4a;
      --accent-2: #7f1d1d;
      --gb: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(185,28,74,0.10), transparent 55%),
        radial-gradient(circle at 80% 80%, rgba(190,18,60,0.06), transparent 60%),
        var(--bg);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      -webkit-app-region: drag;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--panel);
      border: 1px solid var(--gb);
      border-radius: 18px;
      padding: 36px 32px 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
      -webkit-app-region: no-drag;
    }
    .orb {
      width: 64px; height: 64px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.45), var(--accent) 55%, #1a0610);
      box-shadow: 0 0 32px rgba(185,28,74,0.55), inset 0 0 14px rgba(185,28,74,0.2);
      margin: 0 auto 20px;
      animation: pulse 3.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 32px rgba(185,28,74,0.55), inset 0 0 14px rgba(185,28,74,0.2); }
      50%      { transform: scale(1.04); box-shadow: 0 0 44px rgba(185,28,74,0.75), inset 0 0 18px rgba(185,28,74,0.3); }
    }
    h1 {
      font-family: 'Space Grotesk', 'Space Mono', monospace;
      font-size: 1.15rem;
      letter-spacing: 1.5px;
      text-align: center;
      margin-bottom: 6px;
    }
    .sub {
      text-align: center;
      font-size: 0.78rem;
      color: var(--t2);
      margin-bottom: 28px;
      line-height: 1.55;
    }
    label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 1.8px;
      color: var(--t3);
      margin-bottom: 8px;
    }
    input[type="url"] {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--gb);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--t1);
      font-size: 0.85rem;
      font-family: 'Space Mono', monospace;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    input[type="url"]:focus {
      border-color: rgba(185,28,74,0.45);
      background: rgba(0,0,0,0.45);
    }
    .row { margin-bottom: 16px; }
    button.connect {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 2.5px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(185,28,74,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button.connect:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(185,28,74,0.5);
    }
    button.connect:disabled { opacity: 0.6; cursor: progress; }
    .err {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      font-size: 0.72rem;
      color: #fca5a5;
      display: none;
    }
    .err.show { display: block; }
    .hint {
      margin-top: 18px;
      font-size: 0.66rem;
      color: var(--t3);
      letter-spacing: 0.4px;
      line-height: 1.5;
      text-align: center;
    }
    .hint a { color: var(--accent); cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="orb"></div>
    <h1>// CONNECT TO ORBLOOD</h1>
    <p class="sub">Enter the address of your Orblood server. This is the same URL your team uses in the browser.</p>

    <div class="row">
      <label for="url">SERVER URL</label>
      <input type="url" id="url" placeholder="https://orblood.example.com" autocomplete="off" />
    </div>

    <button class="connect" id="connect">CONNECT</button>
    <div class="err" id="err"></div>

    <p class="hint">
      Don't have one yet? <a id="docs">Read the self-hosting guide</a>.
    </p>
  </div>

  <script>
    const $url     = document.getElementById('url');
    const $btn     = document.getElementById('connect');
    const $err     = document.getElementById('err');
    const $docs    = document.getElementById('docs');

    // Pre-fill if the user previously connected and reset the backend.
    (async () => {
      try {
        const s = await window.orblood.getSettings();
        if (s && s.lastBackendUrl) $url.value = s.lastBackendUrl;
      } catch {}
    })();

    $url.addEventListener('keydown', e => { if (e.key === 'Enter') $btn.click(); });

    $btn.addEventListener('click', async () => {
      const v = ($url.value || '').trim();
      if (!v) {
        showErr('Enter a server URL first.');
        return;
      }
      $btn.disabled = true;
      $btn.textContent = 'CHECKING…';
      hideErr();
      try {
        const r = await window.orblood.setBackendUrl(v);
        if (!r || !r.ok) {
          showErr(r && r.error ? r.error : 'Could not reach that server.');
          $btn.disabled = false;
          $btn.textContent = 'RETRY';
        }
        // On success the main process will navigate the window away from
        // this page, so we don't need to do anything else here.
      } catch (e) {
        showErr(String(e && e.message || e));
        $btn.disabled = false;
        $btn.textContent = 'RETRY';
      }
    });

    $docs.addEventListener('click', () => {
      window.orblood.openExternal('https://github.com/DiyakoMk/meeting');
    });

    function showErr(msg) { $err.textContent = msg; $err.classList.add('show'); }
    function hideErr()    { $err.classList.remove('show'); $err.textContent = ''; }
  </script>
</body>
</html>
