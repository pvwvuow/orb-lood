# Production / staging nginx config.
# Serves the static frontend and reverse-proxies /api → backend.
# Adjust server_name and TLS for your host.

server {
  listen 80;
  server_name _;

  root /var/www/orblood/public;
  index index.html;

  # Static frontend
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API
  # NOTE: uses "backend" hostname so it works inside docker-compose networking.
  # For bare-metal / non-docker deploys change BACKEND_HOST to 127.0.0.1.
  location /api/ {
    proxy_pass         http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # WebSocket (added in phase 4)
  location /ws {
    proxy_pass         http://backend:4000/ws;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_read_timeout 1d;
  }

  # Uploaded avatars / covers — served by the backend on disk.
  location /uploads/ {
    proxy_pass http://backend:4000/uploads/;
    proxy_set_header Host $host;
    expires 7d;
  }

  client_max_body_size 8m;
}
