name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Electron app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: List build output
        run: dir dist-electron
        shell: cmd
      
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
          retention-days: 30
  
  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist-electron
      
      - name: List downloaded files
        run: ls -la dist-electron/
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ORBLOOD Desktop v${{ steps.version.outputs.VERSION }}
          body: |
            ## 🚀 ORBLOOD Desktop v${{ steps.version.outputs.VERSION }}
            
            ### ✨ ویژگی‌ها
            - اتصال مستقیم به orblood.ir
            - دکمه Refresh در پایین سمت چپ
            - سیستم Auto-Update از GitHub
            - رابط کاربری Native
            
            ### 📥 دانلود
            برای Windows: `ORBLOOD-Setup-${{ steps.version.outputs.VERSION }}.exe`
            
            ### 🔄 آپدیت
            اگر نسخه قبلی را نصب کرده‌اید، فقط فایل جدید را اجرا کنید.
            
            ---
            
            **نکته:** پس از نصب، اپلیکیشن به صورت خودکار آپدیت‌های جدید را چک می‌کند.
          draft: false
          prerelease: false
          files: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
