# =============================================================
# coturn configuration for orblood.ir — INSTANCE #1
# Copy this file to /etc/turnserver.conf on your server
# Listens on the standard ports (3478 plain, 5349 TLS).
#
# Production also runs a SECOND instance on port 443 to bypass
# Iranian mobile-carrier UDP blocks. See `turnserver-443.conf`
# in this repo and the "Two-instance setup" section of
# COTURN-SETUP.md.
# =============================================================

# --- Listening ports ---
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# --- Your server's public IP ---
# Replace with the actual public IP of orblood.ir.
# Find it with: curl ifconfig.me
external-ip=194.60.231.226

# --- Realm ---
# Must match what clients pass during long-term auth. We use the
# turn-only subdomain so it stays consistent across both instances.
realm=turn.orblood.ir

# --- Authentication ---
# CRITICAL: this password MUST match TURN_PASSWORD in server/.env
# (and the user= line in turnserver-443.conf). Any mismatch silently
# rejects every Allocate request — browsers see only a long timeout.
lt-cred-mech
user=orblood:c2b2454d70f22f44ef6308b21deb84b4

# --- TLS certificates (Let's Encrypt) ---
# Issued for turn.orblood.ir. Renewed by certbot; coturn re-reads the
# cert on SIGHUP / restart.
cert=/etc/letsencrypt/live/turn.orblood.ir/fullchain.pem
pkey=/etc/letsencrypt/live/turn.orblood.ir/privkey.pem
no-tlsv1
no-tlsv1_1

# --- Relay port range (must be open in firewall) ---
min-port=49152
max-port=65535

# --- Security ---
# Block relay to private/internal networks so the TURN server can't
# be abused to reach our LAN.
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
# Allow relay to the public IP we advertise; without this the server
# refuses self-loop tests like turnutils_uclient -e <public-ip>.
allow-loopback-peers

# --- Performance ---
total-quota=100
stale-nonce=600

# --- Logging ---
# NOTE: /var/log/turnserver.log must be writable by the `turnserver`
# user, or coturn falls back to syslog and `tail -f` shows nothing.
#   sudo touch /var/log/turnserver.log
#   sudo chown turnserver:turnserver /var/log/turnserver.log
log-file=/var/log/turnserver.log
simple-log

# --- Misc ---
fingerprint
no-cli
pidfile=/var/run/turnserver.pid
