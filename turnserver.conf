# =============================================================
# coturn configuration for orblood.ir
# Copy this file to /etc/turnserver.conf on your server
# =============================================================

# --- Listening ports ---
listening-port=3478
tls-listening-port=5349

# --- Your server's public IP ---
# Replace with actual public IP of orblood.ir
# Find it with: curl ifconfig.me
external-ip=194.60.231.226

# --- Realm ---
realm=orblood.ir

# --- Authentication ---
lt-cred-mech
user=orblood:7a6c6c0bab5fb55ec1aa88c388daed13

# --- Relay port range (must be open in firewall) ---
min-port=49152
max-port=65535

# --- TLS certificates (uncomment if you have Let's Encrypt) ---
# cert=/etc/letsencrypt/live/orblood.ir/fullchain.pem
# pkey=/etc/letsencrypt/live/orblood.ir/privkey.pem

# --- Logging ---
log-file=/var/log/turnserver.log
simple-log
# verbose

# --- Security ---
# Block relay to private/internal networks
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# --- Performance ---
# Total relay bandwidth limit (0 = unlimited)
total-quota=0
# Per-session bandwidth limit in bytes/s (0 = unlimited)
bps-capacity=0
# Max sessions
max-bps=0

# --- Misc ---
fingerprint
no-tlsv1
no-tlsv1_1
