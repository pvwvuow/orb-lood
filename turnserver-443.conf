# =============================================================
# coturn configuration for orblood.ir — INSTANCE #2 (port 443)
# Copy this file to /etc/turnserver-443.conf on your server.
#
# Why a second instance?
#   coturn cannot listen on the same port for both plain TURN and
#   TURNS in a single process. Iranian mobile carriers (Irancell,
#   Hamrah-e Aval) commonly block UDP/3478 and TCP/3478, but they
#   never block 443 because that would break HTTPS for everyone.
#   Running coturn on 443 makes our TURN traffic look like normal
#   HTTPS, which gets through DPI middleboxes reliably.
#
# A companion systemd unit (`coturn-443.service`) starts this
# instance with:
#   /usr/bin/turnserver -c /etc/turnserver-443.conf
#
# IMPORTANT: nginx must NOT bind 0.0.0.0:443. On orblood.ir the
# website is fronted by ArvanCloud CDN (which terminates TLS in
# their edge), so the VPS only needs to expose nginx on :80 for
# HTTP-01 ACME challenges and proxying. Port 443 is left free for
# coturn. If you change that topology, move this instance to a
# different port and update TURN_URLS in server/.env accordingly.
# =============================================================

# --- Listening ports ---
# Bind both plain and TLS on 443. coturn auto-detects TLS handshakes
# vs plain STUN/TURN on the same port.
listening-port=443
tls-listening-port=443
listening-ip=0.0.0.0

# --- Your server's public IP ---
external-ip=194.60.231.226

# --- Realm ---
# Must be identical to the realm in turnserver.conf so a single
# TURN_USERNAME/TURN_PASSWORD in .env works against either instance.
realm=turn.orblood.ir

# --- Authentication (must match turnserver.conf and server/.env) ---
lt-cred-mech
user=orblood:c2b2454d70f22f44ef6308b21deb84b4

# --- TLS certificates ---
cert=/etc/letsencrypt/live/turn.orblood.ir/fullchain.pem
pkey=/etc/letsencrypt/live/turn.orblood.ir/privkey.pem
no-tlsv1
no-tlsv1_1

# --- Relay port range (shared with instance #1) ---
min-port=49152
max-port=65535

# --- Security ---
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
allow-loopback-peers

# --- Performance ---
total-quota=100
stale-nonce=600

# --- Logging ---
# Separate file from instance #1 so we can tell which port a request
# arrived on. Make it writable by the `turnserver` user:
#   sudo touch /var/log/turnserver-443.log
#   sudo chown turnserver:turnserver /var/log/turnserver-443.log
log-file=/var/log/turnserver-443.log
simple-log

# --- Misc ---
fingerprint
no-cli
# Distinct pidfile from instance #1 so both can run concurrently.
pidfile=/var/run/turnserver-443.pid
