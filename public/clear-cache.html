<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Cache - ORBLOOD</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(30, 30, 50, 0.8);
      border-radius: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      max-width: 500px;
    }
    h1 {
      margin: 0 0 20px 0;
      font-size: 32px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      margin: 15px 0;
      color: #aaa;
      line-height: 1.6;
    }
    .status {
      margin: 20px 0;
      padding: 15px;
      background: rgba(139, 92, 246, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .success {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }
    button {
      margin: 10px 5px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }
    .btn-secondary {
      background: rgba(139, 92, 246, 0.2);
      color: #8b5cf6;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .btn-secondary:hover {
      background: rgba(139, 92, 246, 0.3);
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Clear Cache</h1>
    <p>If you're seeing old content, click the button below to clear all cached data and reload the app.</p>
    
    <div class="status" id="status">
      <p>Ready to clear cache</p>
    </div>
    
    <button class="btn-primary" id="clearBtn" onclick="clearAllCache()">
      Clear Cache & Reload
    </button>
    
    <button class="btn-secondary" onclick="window.location.href='/'">
      Back to App
    </button>
  </div>

  <script>
    async function clearAllCache() {
      const btn = document.getElementById('clearBtn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Clearing...';
      status.innerHTML = '<p>Clearing cache...</p>';
      
      try {
        // 1. Unregister all service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (let registration of registrations) {
            await registration.unregister();
          }
          status.innerHTML += '<p>✓ Service workers unregistered</p>';
        }
        
        // 2. Clear all caches
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => caches.delete(name)));
          status.innerHTML += '<p>✓ All caches cleared (' + cacheNames.length + ' caches)</p>';
        }
        
        // 3. Clear localStorage
        localStorage.clear();
        status.innerHTML += '<p>✓ LocalStorage cleared</p>';
        
        // 4. Clear sessionStorage
        sessionStorage.clear();
        status.innerHTML += '<p>✓ SessionStorage cleared</p>';
        
        status.className = 'status success';
        status.innerHTML += '<p><strong>✓ All cache cleared successfully!</strong></p>';
        status.innerHTML += '<p>Reloading in 2 seconds...</p>';
        
        // Reload after 2 seconds
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
        
      } catch (error) {
        status.className = 'status';
        status.innerHTML = '<p style="color: #ef4444;">Error: ' + error.message + '</p>';
        btn.disabled = false;
        btn.innerHTML = 'Try Again';
      }
    }
  </script>
</body>
</html>
