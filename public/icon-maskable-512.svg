<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#3a0a18"/>
      <stop offset="60%" stop-color="#020103"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff5577" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#b91c4a"/>
      <stop offset="100%" stop-color="#1e0a14"/>
    </radialGradient>
  </defs>
  <!-- Maskable icons need full-bleed background; safe zone is the centre 80% -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="100" fill="url(#orb)"/>
  <circle cx="223" cy="225" r="22" fill="#fff" opacity="0.18"/>
</svg>
