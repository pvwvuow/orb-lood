# Local-development stack. Brings up MySQL + the backend.
# Run with: docker compose up -d
# Then in another terminal:
#   cd server && npm install && npm run init-db && npm start
# (or build the backend image and run it inside the same compose project — see Dockerfile.)

version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw_change_me
      MYSQL_DATABASE: orblood
      MYSQL_USER: orblood
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  backend:
    build: ./server
    restart: unless-stopped
    depends_on: [db]
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: orblood
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: orblood
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      PORT: 4000
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-https://orblood.ir}
      UPLOAD_DIR: /data/uploads
      PUBLIC_UPLOADS_BASE: /uploads
      # Voice / TURN — self-hosted coturn on orblood.ir
      TURN_HOST: ${TURN_HOST:-orblood.ir}
      TURN_USERNAME: ${TURN_USERNAME:-orblood}
      TURN_PASSWORD: ${TURN_PASSWORD:-orblood}
      TURN_URLS: ${TURN_URLS:-turn:orblood.ir:3478,turn:orblood.ir:3478?transport=tcp,turns:orblood.ir:5349}
      # Legacy vars (still read by config.js as fallback)
      EXPRESSTURN_USERNAME: ${EXPRESSTURN_USERNAME:-}
      EXPRESSTURN_PASSWORD: ${EXPRESSTURN_PASSWORD:-}
      EXPRESSTURN_URLS: ${EXPRESSTURN_URLS:-}
    volumes:
      - uploads:/data/uploads
    ports:
      - "4000:4000"

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/orblood/public:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db-data: {}
  uploads: {}
