# Local-development stack. Brings up MySQL + the backend.
# Run with: docker compose up -d
# Then in another terminal:
#   cd server && npm install && npm run init-db && npm start
# (or build the backend image and run it inside the same compose project — see Dockerfile.)

version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw_change_me
      MYSQL_DATABASE: orblood
      MYSQL_USER: orblood
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  backend:
    build: ./server
    restart: unless-stopped
    depends_on: [db]
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: orblood
      DB_PASSWORD: changeme
      DB_NAME: orblood
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      PORT: 4000
      # PUBLIC_ORIGIN: set this to the URL users open in their browser.
      # Examples:
      #   http://localhost:8080          (local docker-compose)
      #   https://your-domain.com        (production)
      # Wildcard "*" trusts any origin (fine for private/demo setups).
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-*}
      UPLOAD_DIR: /data/uploads
      PUBLIC_UPLOADS_BASE: /uploads
      # Voice / TURN — coturn runs on the same VPS. Set these so the
      # backend tells browsers to relay media through your own server.
      # If PUBLIC_ORIGIN is a real domain, voice-config.js auto-derives
      # TURN URLs from it; these explicit vars take priority if set.
      EXPRESSTURN_USERNAME: ${EXPRESSTURN_USERNAME:-}
      EXPRESSTURN_PASSWORD: ${EXPRESSTURN_PASSWORD:-}
      EXPRESSTURN_URLS: ${EXPRESSTURN_URLS:-}
      COTURN_USERNAME: ${COTURN_USERNAME:-orblood}
      COTURN_PASSWORD: ${COTURN_PASSWORD:-}
    volumes:
      - uploads:/data/uploads
    ports:
      - "4000:4000"

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/orblood/public:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db-data: {}
  uploads: {}
